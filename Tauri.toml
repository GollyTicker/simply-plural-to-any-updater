identifier = "com.example.simplypluraltoanyupdater"

[build]
frontendDist = "target"

[app.security]
#csp = null from JSON. Omitting it here means Tauri will use its default CSP.
#If you need a specific CSP, define it here e.g. csp = "default-src 'self'"
capabilities = [
 "event-listen",
 "event-emit",
 "window-all"
]

#Window definitions are now a map, with the label as the key.
#The 'label' field itself is removed from the window's config.
[[app.windows]]
title = "Application Logs"
width = 800
height = 600
fullscreen = false
resizable = true
visible = true

[bundle]
active = true
targets = "all"
