[package]
name = "sps_status"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "sps_status"
path = "src/main.rs"

[dependencies]
chrono = "0.4"
rocket = "0.5"
anyhow = "1.0"
dotenvy = "0.15"
vrchatapi = "1.0"
encoding_rs = "0.8"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "cookies", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1.0"
html-escape = "0.2.13"
tauri = { version = "2", features = ["tray-icon", "config-toml", "protocol-asset"] }

clap = { version = "4.0", features = ["derive", "env"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt", "registry"] }
