<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>App Logs</title>
  <style>
    body { font-family: monospace; margin: 0; background-color: #1e1e1e; color: #d4d4d4; font-size: 13px; }
    #log-container {
      white-space: pre-wrap;
      word-wrap: break-word;
      padding: 10px;
      height: 100vh;
      overflow-y: auto;
      box-sizing: border-box;
    }
    .log-line { padding: 2px 0; }
    /* Add more styles for different log levels if you parse them from the message */
  </style>
</head>
<body>
  <div id="log-container"></div>
  <script>
    // Ensure __TAURI__ is available
    // For Tauri v2, you might import from '@tauri-apps/api/event'
    // const { listen } = window.__TAURI__.event; // For older Tauri or if directly available
    
    // It's generally better to import from the API package in Tauri v2
    // Assuming you have @tauri-apps/api installed and your frontend is bundled
    // import { listen } from 'https://cdn.jsdelivr.net/npm/@tauri-apps/api/event.js'; // Example for simple HTML with CDN
    
    // If using a bundler (Vite, Webpack), you'd do:
    // import { listen } from '@tauri-apps/api/event';

    (async () => {
      // For simple HTML, ensure the __TAURI__ object is loaded.
      // If using a modern frontend setup, imports are preferred.
      let tauriListen;
      if (window.__TAURI__ && window.__TAURI__.event && window.__TAURI__.event.listen) {
        tauriListen = window.__TAURI__.event.listen;
      } else {
        // Fallback or wait for API to be ready if needed, or use dynamic import
        try {
            const eventApi = await import('https://cdn.jsdelivr.net/npm/@tauri-apps/api/event.js');
            tauriListen = eventApi.listen;
        } catch (e) {
            console.error("Failed to load Tauri event API:", e);
            const logContainer = document.getElementById('log-container');
            const errorLine = document.createElement('div');
            errorLine.style.color = 'red';
            errorLine.textContent = "Error: Could not connect to Tauri backend for logs. Ensure you are running within a Tauri app.";
            logContainer.appendChild(errorLine);
            return;
        }
      }

      const logContainer = document.getElementById('log-container');

      await tauriListen('log-message', (event) => {
        const line = document.createElement('div');
        line.className = 'log-line';
        line.textContent = event.payload; // event.payload should be the formatted string
        logContainer.appendChild(line);
        logContainer.scrollTop = logContainer.scrollHeight;
      });

      // Optional: Send a message to backend indicating frontend is ready for logs
      // if (window.__TAURI__ && window.__TAURI__.invoke) {
      //   window.__TAURI__.invoke('frontend_ready_for_logs');
      // }
      const readyLine = document.createElement('div');
      readyLine.style.fontStyle = 'italic';
      readyLine.textContent = "Log listener initialized. Waiting for messages...";
      logContainer.appendChild(readyLine);

    })();
  </script>
</body>
</html>
